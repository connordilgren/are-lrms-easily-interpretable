# need 4 gpus

project: coconut
save_path: checkpoints
name: llama32-1b_prontoqa_multimode

only_eval: False

# Multi-mode training settings
multimode: True
alpha: 1.0  # Latent loss weight
beta: 1.0   # Verbalized loss weight
gamma: 1.0  # Direct loss weight

coconut: False  # Multimode handles this
cot: False
no_thoughts: False
no_cot: False

c_thought: 1
stage_0_epochs: 3
epochs_per_stage: 2
max_latent_stage: 6
pad_latent_to_max: True

save_only_improve: False
uniform_prob: 0.0
model_id: meta-llama/Llama-3.2-1B-Instruct
load_model_path: None
seed: 0
resume: 0
bf16: True
train_path: data/prontoqa_train.json
val_path: data/prontoqa_valid.json
reset_optimizer: True
batch_size_training: 32
debug: False
gradient_accumulation_steps: 1
num_epochs: 20
lr: !!float "5e-5"
weight_decay: 0.1
