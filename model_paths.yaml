# Configuration for model checkpoint paths
# Edit these paths to match your trained models before running run_all.sh
#
# Path conventions:
#   - Local checkpoints: "checkpoints/{name}/checkpoint_XX"
#   - HuggingFace: "zen-E/CODI-gpt2" (for published checkpoints)
#
# Set a path to null to skip that model during evaluation.

gpt2:
  model_id: "openai-community/gpt2"
